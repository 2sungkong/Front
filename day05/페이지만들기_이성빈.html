<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* header */
        .header{
            height: 100px;
            display: flex;
            background-color: aqua;

            position: relative;
        }
        .header-logo{
            position: absolute;
            left: 30px;
        }
        .header-logo img{
            width: auto;
            height: 100px;
        }
        .header-btn{
            position: absolute;
            right: 0;
            top: 0;
        }
        .header-btn-wrap{
            list-style: none;
            width: 200px;
            border: 1px solid black;
            display: flex;

        }
        .header-btn-wrap img{
            width: 30px;
            height: 30px;
        }
        .header-btn-wrap li{
            margin-right: 10px;
        }
        .header-btn-wrap button{
            background-color: antiquewhite;
        }

        /* nav */
        .nav{
            height: 40px;
            background-color: blue;
            display: flex;
        }

            /* 메뉴바 */
            .nav-menu{
                width: 60%;
                border: 1px solid black;

                display: flex;
            }
            .nav-menu ul{
                list-style: none;
                margin: 0;
                padding: 0;
                
            }
            .nav-menu-item{
                border:1px solid black;
                width: 25%;
                height: 20px;
                line-height: 40px;
                text-align: center;

            }
            .nav-hidden-menu{  
                width: 100%;     
                background-color: #ccc;
                text-align: center;
                padding: 5px;
                box-sizing: border-box;
                text-align: left;
            
                
                position: absolute;
                top:40px;
                left: 0px;
            }

            /* 검색바 */
            .nav-search{
                width: 40%;
                border: 1px solid black;
                
                position: relative;
            }

            .nav-text{
                width: 70%;
                height: 80%;
                box-sizing: border-box;

                position: absolute;
                right: 5%;
                top: 10%;

                border: none;
                border-bottom: 3px solid #333;
                outline: none;
                padding: 10px;
            }
            .nav-img{
                width: 20px;
                height: 20px;

                background-image: url(https://cdn-icons-png.flaticon.com/128/4347/4347487.png);
                background-position: center;
                background-size: cover;

                position: absolute;
                right: 7%;
                top: 20%;
            }

        

        /* section */
        .section{
            height: 600px;
            background-color: yellow;
        }

        /* footer */
        .footer{
            height: 100px;
            background-color: gray;
        }

    </style>

</head>
<body>
    <!-- header -->
    <div class="header">
        <div class="header-logo">
            <img src="https://cdn-icons-png.flaticon.com/128/80/80650.png" alt="로고이미지">
        </div>

        <div class="header-btn">
            <ul class="header-btn-wrap">
                <li><button><img src="https://cdn-icons-png.flaticon.com/128/4663/4663997.png" alt="로그인">login</button></li>
                <li><button><img src="https://cdn-icons-png.flaticon.com/128/12291/12291309.png" alt="회원가입">login</button></li>
                <li><button><img src="https://cdn-icons-png.flaticon.com/128/1160/1160356.png" alt="설정">login</button></li>
            </ul>
        </div>
    </div>

    <!-- nav -->
    <div class="nav">
        <div class="nav-menu">
            <ul>
                <!-- 상위메뉴1 -->
                <li class="nav-menu-item"> <span class="title">HOME</span>
                </li>

                <!-- 상위메뉴2 -->
                <li class="nav-menu-item"> <span class="title">MENU</span>
                    <!-- 하위메뉴2-->
                    <ul class="nav-hidden-menu">
                        <li>푸드</li>
                        <li>음료</li>
                        <li>스낵</li>
                        <li>상품</li>
                    </ul>
                </li>
                <!-- 상위메뉴3 -->
                <li class="nav-menu-item"> <span class="title">INTRODUCTION</span>
                    <!-- 하위메뉴3-->
                    <ul class="nav-hidden-menu">
                        <li>하위메뉴1</li>
                        <li>하위메뉴1</li>
                        <li>하위메뉴1</li>
                        <li>하위메뉴1</li>
                    </ul>
                </li>

                <!-- 상위메뉴4 -->
                <li class="nav-menu-item"> <span class="title">Question</span>
                    <!-- 하위메뉴4-->
                    <ul class="nav-hidden-menu">
                        <li>하위메뉴1</li>
                        <li>하위메뉴1</li>
                        <li>하위메뉴1</li>
                        <li>하위메뉴1</li>
                    </ul>
                </li>
                
            </ul>
        </div>

        <div class="nav-search">
            <input type="text" placeholder="무엇을 찾고계시나요?" class="nav-text">
            <div class="nav-img"></div>
        </div>
    </div>

    <!-- section -->
    <div class="section"></div>

    <!-- footer -->
    <div class="footer"></div>
</body>
</html>
